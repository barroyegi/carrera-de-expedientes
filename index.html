<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrera de Expedientes · Pixel Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #06070f;
      --panel: #0a0c18;
      --card: #0f1222;
      --b1: #182038;
      --b2: #243058;
      --txt: #b0c8e0;
      --muted: #304860;
      --acc: #f5c800;
      --acc2: #ff5820;
      --grn: #30d860;
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'VT323', monospace;
      display: flex;
      flex-direction: column
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.05) 2px, rgba(0, 0, 0, 0.05) 3px);
    }

    header {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #0d1428, #060c18);
      border-bottom: 3px solid var(--b2);
      box-shadow: 0 3px 0 var(--b1);
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--acc);
      text-shadow: 2px 2px 0 #7a6200, 0 0 28px rgba(245, 200, 0, .5);
      letter-spacing: 1px
    }

    .logo b {
      color: var(--acc2)
    }

    .hbtns {
      display: flex;
      gap: 8px;
      align-items: center
    }

    .hstat {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--muted);
      text-align: right;
      line-height: 2
    }

    .pb {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 8px 13px;
      cursor: pointer;
      background: var(--card);
      color: var(--txt);
      border: none;
      outline: none;
      box-shadow: inset -2px -2px 0 #020406, inset 2px 2px 0 var(--b2);
      transition: .06s all;
    }

    .pb:hover {
      background: #151a2c
    }

    .pb:active {
      box-shadow: inset 2px 2px 0 #020406, inset -2px -2px 0 var(--b2);
      transform: translate(1px, 1px)
    }

    .pb.g {
      background: #0a2208;
      color: var(--grn);
      box-shadow: inset -2px -2px 0 #020802, inset 2px 2px 0 #205818;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      flex: 1;
      min-height: 0;
      overflow: hidden
    }

    .race-wrap {
      position: relative;
      overflow: hidden;
      background: #06070f
    }

    #MC {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges
    }

    .sb {
      background: var(--panel);
      border-left: 3px solid var(--b2);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .sb::-webkit-scrollbar {
      width: 5px;
      background: var(--bg)
    }

    .sb::-webkit-scrollbar-thumb {
      background: var(--b2)
    }

    .slb {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--muted);
      letter-spacing: 1.5px;
      padding: 4px 0 3px;
      border-bottom: 2px solid var(--b1);
      margin-bottom: 2px
    }

    .grow {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 2px solid var(--b2);
      padding: 8px 10px
    }

    .grow label {
      font-size: 15px;
      color: var(--muted);
      flex: 1
    }

    .pxi {
      background: #040508;
      color: var(--acc);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 5px 8px;
      width: 76px;
      text-align: center;
      border: none;
      box-shadow: inset 1px 1px 0 #000, inset -1px -1px 0 var(--b2);
      outline: none
    }

    .pxi:focus {
      box-shadow: inset 1px 1px 0 #000, inset -1px -1px 0 var(--acc)
    }

    .rc {
      background: var(--card);
      border: 2px solid var(--b1);
      padding: 9px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: .1s border-color
    }

    .rc:hover {
      border-color: var(--b2)
    }

    .rc.open {
      border-color: var(--acc)
    }

    .ctop {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .avbox {
      width: 48px;
      height: 64px;
      flex-shrink: 0;
      cursor: pointer;
      border: 2px solid var(--b2);
      background: var(--bg);
      image-rendering: pixelated;
      transition: .1s border-color;
      overflow: hidden
    }

    .avbox:hover {
      border-color: var(--acc)
    }

    .avbox img {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated
    }

    .cmeta {
      flex: 1;
      min-width: 0
    }

    .nmi {
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--b1);
      color: var(--txt);
      font-family: 'VT323', monospace;
      font-size: 17px;
      padding: 0 0 1px;
      width: 100%
    }

    .nmi:focus {
      outline: none;
      border-bottom-color: var(--acc)
    }

    .cpct {
      font-size: 14px;
      color: var(--muted);
      margin-top: 1px
    }

    .rnk {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--acc);
      min-width: 20px;
      text-align: right
    }

    .baro {
      height: 8px;
      background: #040508;
      box-shadow: inset 1px 1px 0 #000, inset -1px -1px 0 var(--b2);
      overflow: hidden
    }

    .bari {
      height: 100%;
      transition: width .6s steps(20, end);
      position: relative
    }

    .bari::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255, 255, 255, .2)
    }

    .vrow {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .vlb {
      font-size: 14px;
      color: var(--muted)
    }

    .vni {
      width: 68px !important;
      font-size: 8px !important
    }

    .cpan {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: var(--bg);
      border: 2px solid var(--b1);
      padding: 8px;
      margin-top: 2px
    }

    .cpan.open {
      display: flex
    }

    .cplb {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 3px
    }

    .swrow {
      display: flex;
      flex-wrap: wrap;
      gap: 4px
    }

    .sw {
      width: 18px;
      height: 18px;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
      transition: .07s border-color
    }

    .sw:hover {
      border-color: #fff
    }

    .sw.sel {
      border-color: var(--acc)
    }

    .sw.rnd {
      border-radius: 50%
    }

    .trow {
      display: flex;
      gap: 3px;
      flex-wrap: wrap
    }

    .tg {
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      padding: 5px 6px;
      cursor: pointer;
      background: var(--card);
      color: var(--muted);
      box-shadow: inset -2px -2px 0 #020406, inset 2px 2px 0 var(--b1);
    }

    .tg.sel {
      background: #101828;
      color: var(--acc);
      box-shadow: inset 2px 2px 0 #020406, inset -2px -2px 0 var(--b1);
    }

    .toast {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--acc);
      color: #000;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 9px 18px;
      box-shadow: 3px 3px 0 #7a6200;
      transition: .22s transform;
      z-index: 9999;
      pointer-events: none
    }

    .toast.show {
      transform: translateX(-50%) translateY(0)
    }

    @media(max-width:680px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 50vw 1fr
      }

      .sb {
        border-left: none;
        border-top: 3px solid var(--b2)
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🕹 <b>EXPEDIENTES</b> TRAIL</div>
    <div class="hbtns">
      <button class="pb" id="pauseBtn" onclick="togglePause()">⏸ PAUSA</button>
      <button class="pb g" onclick="applyAll()">► ACTUALIZAR</button>
    </div>
  </header>
  <div class="layout">
    <div class="race-wrap"><canvas id="MC"></canvas></div>
    <aside class="sb" id="sb"></aside>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    /* ════════════════════════════════════════════
       VIRTUAL CANVAS  640 × 360
       ════════════════════════════════════════════ */
    const VW = 640, VH = 360;
    const vCv = document.createElement('canvas');
    vCv.width = VW; vCv.height = VH;
    const vc = vCv.getContext('2d');
    vc.imageSmoothingEnabled = false;

    const MC = document.getElementById('MC');
    const mc = MC.getContext('2d');
    mc.imageSmoothingEnabled = false;

    function resizeMain() {
      const p = MC.parentElement;
      MC.width = p.clientWidth; MC.height = p.clientHeight;
      mc.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resizeMain); resizeMain();

    /* ════════════════════════════════════════════
       COLOR UTILS
       ════════════════════════════════════════════ */
    function hexRgb(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)] }
    function darken(h, f) { const [r, g, b] = hexRgb(h); return `rgb(${r * f | 0},${g * f | 0},${b * f | 0})` }
    function lighten(h, f) { const [r, g, b] = hexRgb(h); return `rgb(${Math.min(255, r * f | 0)},${Math.min(255, g * f | 0)},${Math.min(255, b * f | 0)})` }
    function alpha(h, a) { const [r, g, b] = hexRgb(h); return `rgba(${r},${g},${b},${a})` }

    /* ════════════════════════════════════════════
       PALETTES
       ════════════════════════════════════════════ */
    const SKIN = ['#fde8c8', '#f5c5a3', '#e8a882', '#d4926a', '#b8744a', '#9a5530', '#7a3c18', '#5a2c10'];
    const HAIR = ['#f5e070', '#e8c070', '#c89848', '#a06828', '#8b5c20', '#5c3010', '#2a1808', '#101010',
      '#d8d8d8', '#e83030', '#3088e8', '#a030e0', '#30d070', '#ff90c0'];
    const SHIRT = ['#d01818', '#e85010', '#e88000', '#c8b000', '#50b828', '#18a058', '#1888c8', '#1850b0',
      '#5848c8', '#a028b0', '#c82880', '#888888', '#e8e8e8', '#102040', '#204020', '#8b3a1a'];
    const PANTS = ['#181830', '#20304a', '#283858', '#1a3a1a', '#3a1a10', '#483820', '#202020', '#382838',
      '#502808', '#0a2a40', '#3a3a18', '#c8c8c8', '#504030', '#101828', '#2a1030', '#082818'];
    const SHOES = ['#101010', '#181830', '#301808', '#083018', '#e8e8e8', '#c83018', '#1848c8', '#484848',
      '#b87010', '#800808', '#084808', '#303048'];
    const HAIR_NAMES = ['Corto', 'Largo', 'Cresta', 'Rapao', 'Gorra', 'Ronaldo'];
    const GENDER_NAMES = ['Masc', 'Fem'];

    /* ════════════════════════════════════════════
       RUNNERS
       ════════════════════════════════════════════ */
    let GOAL = 100, paused = false;
    let runners = [
      { id: 0, name: 'Anna', value: 42, shirt: 6, pants: 0, skin: 2, hair: 6, hStyle: 1, gender: 1, shoe: 4 },
      { id: 1, name: 'Sara', value: 67, shirt: 0, pants: 1, skin: 0, hair: 5, hStyle: 0, gender: 0, shoe: 1 },
      { id: 2, name: 'Victoria', value: 55, shirt: 8, pants: 2, skin: 3, hair: 1, hStyle: 3, gender: 1, shoe: 0 },
      { id: 3, name: 'Natalia', value: 30, shirt: 3, pants: 4, skin: 1, hair: 4, hStyle: 7, gender: 0, shoe: 2 },
      { id: 4, name: 'Celico', value: 78, shirt: 2, pants: 7, skin: 4, hair: 0, hStyle: 4, gender: 1, shoe: 5 },
      { id: 5, name: 'Javi', value: 20, shirt: 7, pants: 3, skin: 0, hair: 8, hStyle: 2, gender: 0, shoe: 8 },
    ];
    let animVals = runners.map(r => r.value);
    let targetVals = runners.map(r => r.value);
    let framePh = runners.map((_, i) => i * 0.8);
    let lastT = null;

    /* ════════════════════════════════════════════
       SPRITE ENGINE  32 × 48 pixels
       All drawing is done programmatically using
       pixel-precise rectangles. Each body part is
       explicitly plotted so sprites are readable
       at any scale.
       ════════════════════════════════════════════ */
    const SW = 32, SH = 48;

    // p(ctx, x,y,w,h,col) — draw one pixel block
    function p(ctx, x, y, w, h, col) { ctx.fillStyle = col; ctx.fillRect(x, y, w, h); }

    // Draw outline/shadow under a rect
    function outline(ctx, x, y, w, h) {
      p(ctx, x, y + h, w, 1, 'rgba(0,0,0,0.5)');  // bottom shadow
      p(ctx, x + w, y, 1, h, 'rgba(0,0,0,0.4)');  // right shadow
    }

    function drawSprite(ctx, r, frame) {
      // frame: 0=stand, 1=leftFwd, 2=rightFwd, 99=celebrate
      const sk = SKIN[r.skin];
      const skD = darken(sk, .72);
      const skL = lighten(sk, 1.2);
      const ha = HAIR[r.hair];
      const haD = darken(ha, .6);
      const haL = lighten(ha, 1.4);
      const sh = SHIRT[r.shirt];
      const shD = darken(sh, .65);
      const shL = lighten(sh, 1.45);
      const pa = PANTS[r.pants];
      const paD = darken(pa, .62);
      const paL = lighten(pa, 1.3);
      const zo = SHOES[r.shoe];
      const zoD = darken(zo, .6);
      const zoL = lighten(zo, 1.5);
      const OUT = '#060608';
      const isFem = r.gender === 1;

      ctx.clearRect(0, 0, SW, SH);

      /* ── 1. HAIR (back layer, drawn before head) ── */
      drawHair(ctx, r, ha, haD, haL, OUT, isFem, true); // back

      /* ── 2. HEAD ── */
      // Head shape: 10w × 12h oval, centered at x=11, y=3
      const hx = 11, hy = 3, hw = 10, hh = 12;
      p(ctx, hx, hy, hw, 1, OUT);                      // top outline
      p(ctx, hx, hy + hh, hw, 1, OUT);                   // bottom outline
      p(ctx, hx - 1, hy + 1, 1, hh - 2, OUT);               // left outline
      p(ctx, hx + hw, hy + 1, 1, hh - 2, OUT);              // right outline
      p(ctx, hx, hy + 1, hw, hh - 2, sk);                  // skin fill
      p(ctx, hx + 1, hy + 1, hw - 2, 1, skL);               // top highlight row
      p(ctx, hx, hy + 1, 1, hh - 2, skL);                 // left highlight col
      p(ctx, hx + hw - 1, hy + 1, 1, hh - 2, skD);            // right shadow
      p(ctx, hx + 1, hy + hh - 2, hw - 2, 2, skD);            // jaw shadow

      // Ears
      p(ctx, hx - 2, hy + 5, 2, 4, sk);
      p(ctx, hx - 2, hy + 5, 1, 4, skD);
      p(ctx, hx + hw, hy + 5, 2, 4, sk);
      p(ctx, hx + hw + 1, hy + 5, 1, 4, skD);

      /* ── 3. EYES ── */
      // Left eye (viewer's right): x=14, y=8
      p(ctx, 14, 8, 3, 3, '#ffffff');                   // white
      p(ctx, 14, 8, 3, 1, OUT);                         // top lid
      p(ctx, 14, 8, 1, 3, OUT);                         // left lid
      p(ctx, 16, 8, 1, 3, OUT);                         // right lid
      p(ctx, 14, 10, 3, 1, OUT);                        // bottom lid
      p(ctx, 15, 9, 1, 1, '#1a2850');                   // iris
      p(ctx, 15, 9, 1, 1, OUT);                         // pupil center
      p(ctx, 15, 8, 1, 1, 'rgba(255,255,255,0.8)');     // glint
      // Right eye: x=19, y=8
      p(ctx, 19, 8, 3, 3, '#ffffff');
      p(ctx, 19, 8, 3, 1, OUT); p(ctx, 19, 8, 1, 3, OUT); p(ctx, 21, 8, 1, 3, OUT); p(ctx, 19, 10, 3, 1, OUT);
      p(ctx, 20, 9, 1, 1, '#1a2850'); p(ctx, 20, 9, 1, 1, OUT); p(ctx, 20, 8, 1, 1, 'rgba(255,255,255,0.8)');
      // Eyebrows
      const browCol = haD;
      p(ctx, 14, 7, 3, 1, browCol);
      p(ctx, 19, 7, 3, 1, browCol);

      /* ── 4. NOSE ── */
      p(ctx, 18, 11, 2, 1, skD);   // nose bridge shadow
      p(ctx, 17, 12, 1, 1, skD);   // left nostril shadow

      /* ── 5. MOUTH ── */
      p(ctx, 15, 13, 4, 1, darken(sk, .6));   // smile line
      if (!isFem) { p(ctx, 15, 13, 1, 1, darken(sk, .5)); p(ctx, 18, 13, 1, 1, darken(sk, .5)); }
      // Lip for female
      if (isFem) { p(ctx, 15, 13, 4, 1, '#d06060'); p(ctx, 16, 13, 2, 1, '#e08080'); }

      /* ── 6. HAIR (front layer) ── */
      drawHair(ctx, r, ha, haD, haL, OUT, isFem, false);

      /* ── 7. NECK ── */
      p(ctx, 15, 15, 4, 3, sk);
      p(ctx, 15, 15, 1, 3, skL);
      p(ctx, 18, 15, 1, 3, skD);

      /* ── 8. BODY — varies by animation frame ── */
      const f = frame === 99 ? 0 : frame; // celebrate uses frame 0 body base

      // Torso: 12w × 10h at x=10,y=18
      const tx = 10, ty = 18, tw = 12, th = 10;
      p(ctx, tx, ty, tw, th, sh);
      p(ctx, tx, ty, tw, 1, OUT);                       // top
      p(ctx, tx, ty + th, tw, 1, OUT);                    // bottom
      p(ctx, tx - 1, ty, 1, th + 1, OUT);                   // left
      p(ctx, tx + tw, ty, 1, th + 1, OUT);                  // right
      p(ctx, tx, ty, 1, th, shL);                       // left highlight
      p(ctx, tx, ty, tw, 1, shL);                       // top highlight
      p(ctx, tx + tw - 1, ty, 1, th, shD);                  // right shadow
      p(ctx, tx + 1, ty + th - 2, tw - 2, 2, shD);             // bottom shadow
      // Shirt collar V-neck
      p(ctx, 14, 18, 4, 1, shL);
      p(ctx, 15, 19, 2, 1, shL);
      // Bib number
      p(ctx, 13, 21, 6, 5, 'rgba(255,255,255,0.9)');
      p(ctx, 13, 21, 6, 1, 'rgba(0,0,0,0.15)');
      p(ctx, 14, 22, 4, 3, 'rgba(0,0,0,0.1)');
      // Race number text (tiny "1" shape)
      p(ctx, 15, 22, 1, 3, 'rgba(0,0,0,0.6)'); p(ctx, 14, 22, 1, 1, 'rgba(0,0,0,0.6)');
      p(ctx, 14, 24, 3, 1, 'rgba(0,0,0,0.6)');

      /* ── 9. HIPS / SHORTS ── */
      const hipY = 28;
      p(ctx, tx, hipY, tw, 1, paL);            // waistband highlight
      p(ctx, tx, hipY + 1, tw, 1, pa);
      p(ctx, tx, hipY + 2, tw, 1, pa);
      p(ctx, tx - 1, hipY, 1, 3, OUT);
      p(ctx, tx + tw, hipY, 1, 3, OUT);

      /* ── 10. ARMS — animated ── */
      // Arm swing: f0=neutral, f1=left back/right fwd, f2=left fwd/right back
      if (frame === 99) {
        // Celebrate: both arms up
        // Left arm up
        p(ctx, 6, 17, 3, 8, sh); p(ctx, 5, 16, 2, 8, sh);
        p(ctx, 5, 16, 1, 8, shL); p(ctx, 7, 16, 1, 8, shD);
        // Forearm
        p(ctx, 4, 12, 3, 6, sk); p(ctx, 4, 12, 1, 6, skL); p(ctx, 6, 12, 1, 6, skD);
        // Right arm up
        p(ctx, 23, 17, 3, 8, sh); p(ctx, 25, 16, 2, 8, sh);
        p(ctx, 23, 16, 1, 8, shD); p(ctx, 26, 16, 1, 8, shL);
        // Forearm
        p(ctx, 25, 12, 3, 6, sk); p(ctx, 25, 12, 1, 6, skD); p(ctx, 27, 12, 1, 6, skL);
      } else if (f === 0) {
        // Neutral: arms slightly bent at sides
        drawArm(ctx, sh, shD, shL, sk, skD, skL, OUT, false, 0);  // left arm
        drawArm(ctx, sh, shD, shL, sk, skD, skL, OUT, true, 0);  // right arm
      } else if (f === 1) {
        // Left arm back, right arm forward
        drawArm(ctx, sh, shD, shL, sk, skD, skL, OUT, false, -1); // left back
        drawArm(ctx, sh, shD, shL, sk, skD, skL, OUT, true, 1); // right forward
      } else {
        // Left arm forward, right arm back
        drawArm(ctx, sh, shD, shL, sk, skD, skL, OUT, false, 1);  // left forward
        drawArm(ctx, sh, shD, shL, sk, skD, skL, OUT, true, -1); // right back
      }

      /* ── 11. LEGS — animated ── */
      if (frame === 99) {
        // Both feet down, standing wide
        drawLeg(ctx, pa, paD, paL, zo, zoD, zoL, sk, skD, skL, OUT, false, 0);
        drawLeg(ctx, pa, paD, paL, zo, zoD, zoL, sk, skD, skL, OUT, true, 0);
      } else if (f === 0) {
        drawLeg(ctx, pa, paD, paL, zo, zoD, zoL, sk, skD, skL, OUT, false, 0);
        drawLeg(ctx, pa, paD, paL, zo, zoD, zoL, sk, skD, skL, OUT, true, 0);
      } else if (f === 1) {
        drawLeg(ctx, pa, paD, paL, zo, zoD, zoL, sk, skD, skL, OUT, false, -1);
        drawLeg(ctx, pa, paD, paL, zo, zoD, zoL, sk, skD, skL, OUT, true, 1);
      } else {
        drawLeg(ctx, pa, paD, paL, zo, zoD, zoL, sk, skD, skL, OUT, false, 1);
        drawLeg(ctx, pa, paD, paL, zo, zoD, zoL, sk, skD, skL, OUT, true, -1);
      }

      /* ── 12. Ground shadow ── */
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(16, SH - 1, 9, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    /* ── ARM DRAWING ──
       isRight: false=left arm, true=right arm
       pose: -1=back, 0=neutral, 1=forward
    */
    function drawArm(ctx, sh, shD, shL, sk, skD, skL, OUT, isRight, pose) {
      const x = isRight ? 23 : 6;  // base x
      const xD = isRight ? 1 : -1; // direction
      const ay = 19;           // shoulder y

      if (pose === 0) {
        // Neutral: straight down
        const ax = isRight ? 22 : 9;
        p(ctx, ax, ay, 3, 7, sh);
        p(ctx, ax + (isRight ? 0 : 0), ay, 1, 7, isRight ? shD : shL);
        p(ctx, ax + (isRight ? 2 : 0), ay, 1, 7, isRight ? shL : shD);
        // Forearm
        p(ctx, ax, ay + 7, 3, 5, sk);
        p(ctx, ax, ay + 7, 1, 5, isRight ? skD : skL);
      } else if (pose === -1) {
        // Arm pulled back (behind body)
        const ax = isRight ? 21 : 8;
        const offY = 3;
        p(ctx, ax, ay + offY, 3, 6, shD);
        // Forearm back-angled
        p(ctx, ax + (isRight ? 1 : -1), ay + offY + 5, 3, 4, darken(sk, .85));
      } else {
        // Arm forward
        const ax = isRight ? 23 : 7;
        const offY = -2;
        p(ctx, ax, ay + offY, 3, 7, sh);
        p(ctx, ax, ay + offY, 1, 7, isRight ? shD : shL);
        // Forearm angled forward
        p(ctx, ax + (isRight ? 1 : -1), ay + offY + 6, 3, 5, sk);
        p(ctx, ax + (isRight ? 1 : -1), ay + offY + 6, 1, 5, isRight ? skD : skL);
      }
    }

    /* ── LEG DRAWING ──
       isRight: false=left, true=right
       pose: -1=back, 0=neutral, 1=forward
    */
    function drawLeg(ctx, pa, paD, paL, zo, zoD, zoL, sk, skD, skL, OUT, isRight, pose) {
      const lx = isRight ? 17 : 10;  // thigh x
      const ly = 31;              // thigh top y

      if (pose === 0) {
        // Both straight down
        p(ctx, lx, ly, 5, 8, pa);
        p(ctx, lx, ly, 1, 8, isRight ? paD : paL);
        p(ctx, lx + 4, ly, 1, 8, isRight ? paL : paD);
        // Shin/skin
        p(ctx, lx, ly + 8, 5, 5, sk);
        p(ctx, lx, ly + 8, 1, 5, isRight ? skD : skL);
        // Shoe
        p(ctx, lx - 1, ly + 13, 7, 4, zo);
        p(ctx, lx - 1, ly + 16, 7, 1, zoD);
        p(ctx, lx - 1, ly + 13, 7, 1, zoL);
        p(ctx, lx - 1, ly + 13, 1, 4, isRight ? zoD : zoL);
      } else if (pose === 1) {
        // Leg forward and up
        const fwdX = isRight ? 18 : 9;
        const fwdY = ly - 4;
        // Thigh forward diagonal
        p(ctx, fwdX, fwdY, 5, 9, pa);
        p(ctx, fwdX, fwdY, 1, 9, isRight ? paD : paL);
        p(ctx, fwdX + 4, fwdY, 1, 9, isRight ? paL : paD);
        // Knee cap
        p(ctx, fwdX + 1, fwdY + 8, 3, 2, lighten(sk, 1.1));
        // Shin vertical
        p(ctx, fwdX, fwdY + 9, 5, 5, sk);
        p(ctx, fwdX, fwdY + 9, 1, 5, isRight ? skD : skL);
        // Shoe (heel up slightly)
        p(ctx, fwdX - 1, fwdY + 13, 7, 3, zo);
        p(ctx, fwdX - 1, fwdY + 15, 7, 1, zoD);
        p(ctx, fwdX - 1, fwdY + 13, 7, 1, zoL);
      } else {
        // Leg back and down
        const bckX = isRight ? 16 : 11;
        const bckY = ly + 2;
        // Thigh back diagonal
        p(ctx, bckX, bckY, 5, 8, paD);
        p(ctx, bckX, bckY, 1, 8, isRight ? darken(paD, .8) : lighten(paD, 1.1));
        // Shin
        p(ctx, bckX, bckY + 8, 5, 5, darken(sk, .85));
        // Shoe behind
        p(ctx, bckX, bckY + 13, 6, 3, zoD);
        p(ctx, bckX, bckY + 13, 6, 1, zo);
      }
    }

    /* ── HAIR DRAWING ──
       back=true: draw elements behind the head (long hair back)
       back=false: draw elements in front (top hair, bangs)
    */
    function drawHair(ctx, r, ha, haD, haL, OUT, isFem, back) {
      const style = HAIR_NAMES[r.hStyle];
      const hx = 11, hy = 3, hw = 10;

      if (back) {
        if (style === 'Largo' || style === 'Ponytail') {
          // Long back hair flowing down
          p(ctx, hx - 2, hy + 2, 3, 18, ha); p(ctx, hx - 2, hy + 2, 1, 18, haL); p(ctx, hx, hy + 2, 1, 18, haD);
          p(ctx, hx + hw - 1, hy + 2, 3, 16, ha); p(ctx, hx + hw + 1, hy + 2, 1, 16, haD);
        }
        if (style === 'Ponytail') {
          // Ponytail bundle going down-right
          p(ctx, hx + hw, hy + 4, 3, 14, ha); p(ctx, hx + hw + 1, hy + 5, 2, 12, haD);
          p(ctx, hx + hw, hy + 17, 4, 3, ha); p(ctx, hx + hw + 1, hy + 18, 2, 2, haD);
        }
        return;
      }

      // Front layer (drawn after head)
      if (style === 'Gorra') {
        // Baseball cap: brim + crown
        p(ctx, hx - 2, hy, hw + 4, 1, OUT);         // brim top outline
        p(ctx, hx - 2, hy + 1, hw + 4, 3, SHIRT[r.shirt]); // brim body
        p(ctx, hx - 1, hy - 3, hw + 2, 5, SHIRT[r.shirt]); // cap crown
        p(ctx, hx - 1, hy - 3, hw + 2, 1, lighten(SHIRT[r.shirt], 1.4)); // crown highlight
        p(ctx, hx, hy - 4, hw, 1, darken(SHIRT[r.shirt], .7)); // crown top
        return;
      }

      if (style === 'Cresta') {
        // Tall strip down center
        p(ctx, hx + 3, hy - 5, 4, 8, ha);
        p(ctx, hx + 4, hy - 5, 2, 8, haL);
        p(ctx, hx + 3, hy - 5, 1, 8, haD);
        // Shaved sides
        p(ctx, hx, hy, 4, 6, darken(SKIN[r.skin], .85));
        p(ctx, hx + 6, hy, 4, 6, darken(SKIN[r.skin], .85));
      } else if (style === 'Rapao') {
        // Bun on top
        p(ctx, hx + 2, hy - 6, 6, 6, ha);
        p(ctx, hx + 3, hy - 6, 4, 1, haL);
        p(ctx, hx + 2, hy - 6, 1, 6, haL);
        p(ctx, hx + 7, hy - 6, 1, 6, haD);
        p(ctx, hx + 2, hy - 1, 6, 2, haD);
        // Top of head hair
        p(ctx, hx, hy - 1, hw, 4, ha);
        p(ctx, hx, hy - 1, hw, 1, haL);
      } else if (style === 'Ronaldo') {
        // Faded sides, top hair
        p(ctx, hx, hy, 3, 5, darken(ha, .5));     // faded left
        p(ctx, hx + 7, hy, 3, 5, darken(ha, .5));   // faded right
        p(ctx, hx + 2, hy - 2, 6, 5, ha);            // top section
        p(ctx, hx + 2, hy - 2, 6, 1, haL);
      } else {
        // Short / Long / Ponytail front: standard top hair
        const extraW = isFem ? 2 : 0;
        p(ctx, hx - extraW, hy - 1, hw + extraW * 2, 5, ha);  // top hair mass
        p(ctx, hx - extraW, hy - 1, hw + extraW * 2, 1, haL); // top highlight
        p(ctx, hx - extraW, hy + 3, 1, 4, isFem ? haD : haD); // left side
        p(ctx, hx + hw + extraW - 1, hy + 3, 1, 4, haD);      // right side shadow
        // Bangs
        if (isFem) {
          p(ctx, hx, hy + 3, 4, 3, ha);     // left bangs
          p(ctx, hx, hy + 3, 1, 3, haL);
        } else {
          p(ctx, hx, hy + 3, 3, 2, ha);
        }
      }
    }

    /* ── SPRITE CACHE ── */
    const _cache = new Map();
    function getCached(runner, frame) {
      const k = `${runner.id},${runner.shirt},${runner.pants},${runner.skin},${runner.hair},${runner.hStyle},${runner.gender},${runner.shoe},${frame}`;
      if (_cache.has(k)) return _cache.get(k);
      const oc = document.createElement('canvas'); oc.width = SW; oc.height = SH;
      const ox = oc.getContext('2d'); ox.imageSmoothingEnabled = false;
      drawSprite(ox, runner, frame);
      _cache.set(k, oc); return oc;
    }
    function clearCache(id) { for (const k of _cache.keys()) if (k.startsWith(`${id},`)) _cache.delete(k); }

    /* ════════════════════════════════════════════
       PARALLAX LANDSCAPE   (all in virtual pixels)
       ════════════════════════════════════════════ */
    const HORIZON = 110;
    let SC = { stars: 0, mtn: 0, city: 0, tree: 0, gnd: 0 };
    const WL = 3200;

    function rng(s) { let x = s; return () => { x = x * 1664525 + 1013904223 & 0xffffffff; return (x >>> 0) / 0xffffffff; } }

    const rm = rng(7);
    const MTNS = Array.from({ length: 22 }, (_, i) => ({
      x: i * 180 + Math.round(rm() * 60), w: Math.round((110 + rm() * 180) / 4) * 4,
      h: Math.round((44 + rm() * 100) / 2) * 2,
      col: ['#141e30', '#101828', '#0c1420', '#18243a'][0 | rm() * 4],
      snow: rm() > .4, rocky: rm() > .55,
    }));
    const rc = rng(17);
    const BLDGS = Array.from({ length: 26 }, (_, i) => ({
      x: i * 160 + Math.round(rc() * 50), w: Math.round((16 + rc() * 36) / 2) * 2,
      h: Math.round((20 + rc() * 60) / 4) * 4,
      col: ['#0c1828', '#091420', '#0e1c30', '#07101e'][0 | rc() * 4],
      lights: rc() > .25, ant: rc() > .5, wt: rc() > .72,
    }));
    const rt = rng(23);
    const TREES = Array.from({ length: 100 }, (_, i) => ({
      x: i * 40 + Math.round(rt() * 18),
      th: Math.round(6 + rt() * 14), cw: Math.round(7 + rt() * 16), ch: Math.round(10 + rt() * 20),
      dk: rt() > .5, pine: rt() > .42,
    }));
    const rv = rng(31);
    const VEGE = Array.from({ length: 70 }, (_, i) => ({
      x: i * 56 + Math.round(rv() * 26),
      type: 0 | rv() * 3, w: Math.round(3 + rv() * 14), h: Math.round(3 + rv() * 12),
    }));
    const rg = rng(41);
    const PROPS = Array.from({ length: 55 }, (_, i) => ({
      x: i * 72 + Math.round(rg() * 34), type: 0 | rg() * 4, s: Math.round(2 + rg() * 7),
    }));
    const rcl = rng(53);
    const CLOUDS = Array.from({ length: 10 }, (_, i) => ({
      x: i * 290 + Math.round(rcl() * 120), y: Math.round(14 + rcl() * 40),
      w: Math.round(36 + rcl() * 90), h: Math.round(12 + rcl() * 26), sp: 0.08 + rcl() * 0.16,
    }));
    let cloudX = 0;

    function drawLandscape() {
      const W = VW, H = VH;
      // Sky bands
      [['#04050c', 0, 20], ['#060810', 20, 18], ['#08091a', 38, 18],
      ['#0b0f22', 56, 18], ['#0e1428', 74, 16], ['#121a32', 90, 14],
      ['#18243c', HORIZON - 6, 6]].forEach(([c, y, h]) => { vc.fillStyle = c; vc.fillRect(0, y, W, h); });

      // Stars
      for (let i = 0; i < 140; i++) {
        const sx = ((i * 173 + 29 - SC.stars) % W + W) % W | 0;
        const sy = ((i * 97 + 11) * 0.84 % (HORIZON * 0.9)) | 0;
        if (i % 19 === 0) {
          vc.fillStyle = '#ffffc8'; vc.fillRect(sx - 1, sy, 3, 1); vc.fillRect(sx, sy - 1, 1, 3);
        } else {
          vc.fillStyle = i % 5 === 0 ? '#d0e0ff' : '#8098c0'; vc.fillRect(sx, sy, i % 3 === 0 ? 2 : 1, i % 3 === 0 ? 2 : 1);
        }
      }

      // Moon (r=14)
      const mX = Math.round(W * 0.87), mY = Math.round(HORIZON * 0.25);
      for (let dy = -14; dy <= 14; dy++)for (let dx = -14; dx <= 14; dx++) {
        if (dx * dx + dy * dy <= 196) {
          const inSh = (dx + 5) * (dx + 5) + (dy - 3) * (dy - 3) <= 81;
          const edge = dx * dx + dy * dy > 169;
          vc.fillStyle = inSh ? '#060810' : edge ? '#c0a858' : '#ecdF88';
          vc.fillRect(mX + dx, mY + dy, 1, 1);
        }
      }
      // Moon glow
      vc.save(); vc.globalAlpha = 0.12;
      const mg = vc.createRadialGradient(mX, mY, 0, mX, mY, 60);
      mg.addColorStop(0, '#f0e090'); mg.addColorStop(1, 'transparent');
      vc.fillStyle = mg; vc.fillRect(mX - 60, mY - 60, 120, 120); vc.restore();

      // Clouds
      cloudX += 0.035;
      CLOUDS.forEach(cl => {
        const cx = ((cl.x - cloudX * cl.sp * 55) % W + W) % W;
        drawCloud(cx, cl.y, cl.w, cl.h);
      });

      // Mountains
      const mOff = SC.mtn % WL | 0;
      for (let rep = -1; rep <= 1; rep++) MTNS.forEach(m => {
        const mx = m.x + rep * WL - mOff;
        if (mx > -m.w - 2 && mx < W + 2) drawMtn(mx, HORIZON, m.w, m.h, m.col, m.snow, m.rocky);
      });

      // City
      const cOff = SC.city % WL | 0;
      for (let rep = -1; rep <= 1; rep++) BLDGS.forEach(b => {
        const bx = b.x + rep * WL - cOff;
        if (bx > -b.w - 2 && bx < W + 2) drawBldg(bx, HORIZON, b);
      });

      // Horizon line
      for (let y = HORIZON - 4; y <= HORIZON + 2; y++) {
        const a = (y - (HORIZON - 4)) / 6;
        vc.fillStyle = `rgba(18,36,24,${a * 0.8})`; vc.fillRect(0, y, W, 1);
      }

      // Ground layers
      [[HORIZON + 0, 3, '#1e3820'], [HORIZON + 3, 5, '#1a3018'], [HORIZON + 8, 8, '#162a14'],
      [HORIZON + 16, 14, '#122212'], [HORIZON + 30, 20, '#0e1c0e'], [HORIZON + 50, H, '#0c180c']
      ].forEach(([y, h, c]) => { vc.fillStyle = c; vc.fillRect(0, y, W, h); });
      // Ground texture
      vc.fillStyle = '#1c3018';
      for (let gy = HORIZON + 5; gy < H; gy += 6) for (let gx = gy % 12; gx < W; gx += 12) vc.fillRect(gx, gy, 5, 1);

      // Trees
      const tOff = SC.tree % WL | 0;
      const tBaseY = HORIZON + 4;
      for (let rep = -1; rep <= 1; rep++) TREES.forEach(t => {
        const tx = t.x + rep * WL - tOff;
        if (tx > -t.cw - 4 && tx < W + t.cw + 4) drawTree(tx, tBaseY, t);
      });

      // Vegetation
      const vOff = (SC.gnd * 0.65) % WL | 0;
      for (let rep = -1; rep <= 1; rep++) VEGE.forEach(v => {
        const vx = v.x + rep * WL - vOff;
        if (vx > -20 && vx < W + 20) drawVege(vx, HORIZON + 18, v);
      });

      // Ground props
      const gOff = SC.gnd % WL | 0;
      for (let rep = -1; rep <= 1; rep++) PROPS.forEach(g => {
        const gx = g.x + rep * WL - gOff;
        if (gx > -14 && gx < W + 14) drawProp(gx, HORIZON + 26, g);
      });

      drawTrack();
    }

    function drawCloud(cx, cy, w, h) {
      const puffs = [[0, 0, w * .48, h], [w * .28, -h * .28, w * .38, h * .72], [-w * .26, -h * .2, w * .36, h * .68], [w * .52, -h * .12, w * .28, h * .52]];
      puffs.forEach(([ox, oy, pw, ph]) => {
        for (let dy = 0; dy < ph; dy++) {
          const hw = pw * Math.sqrt(Math.max(0, 1 - (dy / ph * 2 - 1) ** 2)) * 0.5;
          if (hw < 1) return;
          const a = 0.055 - Math.abs(dy - ph / 2) / (ph * 3) * 0.05;
          vc.fillStyle = `rgba(190,210,255,${a})`;
          vc.fillRect((cx + ox - hw) | 0, (cy + oy + dy) | 0, (hw * 2) | 0, 1);
        }
      });
    }

    function drawMtn(x, baseY, w, h, col, snow, rocky) {
      const cx = x + (w * 0.44) | 0;
      for (let row = 0; row < h; row++) {
        const hw = (w * 0.5 * row / h) | 0;
        const shade = rocky && row > h * .35 ? lighten(col, 1.08) : col;
        vc.fillStyle = shade; vc.fillRect(cx - hw, baseY - h + row, Math.max(1, hw * 2), 1);
        vc.fillStyle = lighten(col, 1.3); vc.fillRect(cx - hw, baseY - h + row, 1, 1);
      }
      if (snow) {
        const sH = (h * 0.28) | 0;
        for (let row = 0; row < sH; row++) {
          const hw = (w * 0.28 * row / sH) | 0;
          vc.fillStyle = row < 2 ? '#e8f0fa' : '#c0d0e8';
          vc.fillRect(cx - hw, baseY - h + row, Math.max(1, hw * 2), 1);
        }
        vc.fillStyle = '#f0f8ff'; vc.fillRect(cx, baseY - h, 1, 1);
      }
      if (rocky) {
        for (let i = 0; i < 4; i++) {
          const ry = (h * .3 + i * h * .16) | 0, rhw = (w * .4 * ry / h) | 0;
          vc.fillStyle = 'rgba(0,0,0,0.18)';
          vc.fillRect(cx - rhw + (rhw * .28 | 0), baseY - h + ry, (rhw * .38 | 0), 2);
        }
      }
    }

    function drawBldg(x, baseY, b) {
      const bx = x | 0, bh = b.h, bw = b.w, by = baseY - bh;
      vc.fillStyle = darken(b.col, .7); vc.fillRect(bx + bw - 2, by, 2, bh);
      vc.fillStyle = b.col; vc.fillRect(bx, by, bw - 2, bh);
      vc.fillStyle = lighten(b.col, 1.65); vc.fillRect(bx, by, bw, 1);
      vc.fillStyle = lighten(b.col, 1.25); vc.fillRect(bx, by, 1, bh);
      if (b.lights) {
        for (let wy = by + 4; wy < baseY - 5; wy += 8) {
          for (let wx = bx + 2; wx < bx + bw - 4; wx += 6) {
            const lit = (Math.floor((wy + wx) / 7)) % 4 !== 0;
            vc.fillStyle = lit ? '#e8c050' : '#0a1420'; vc.fillRect(wx, wy, 3, 4);
            if (lit) { vc.fillStyle = 'rgba(232,192,80,0.18)'; vc.fillRect(wx - 1, wy - 1, 5, 6); }
          }
        }
      }
      if (b.ant) { vc.fillStyle = '#0a1220'; vc.fillRect(bx + (bw / 2 | 0), by - 10, 1, 10); vc.fillStyle = '#c83030'; vc.fillRect(bx + (bw / 2 | 0), by - 10, 2, 2); }
      if (b.wt && bw > 22) { const wx = bx + (bw * .68 | 0); vc.fillStyle = '#0e1a28'; vc.fillRect(wx - 3, by - 14, 6, 9); vc.fillStyle = '#182840'; vc.fillRect(wx - 4, by - 16, 8, 3); }
    }

    function drawTree(x, y, t) {
      const bx = x | 0;
      vc.fillStyle = t.dk ? '#221408' : '#2c1c0a'; vc.fillRect(bx, y + t.ch - 2, 3, t.th + 2);
      vc.fillStyle = darken(t.dk ? '#221408' : '#2c1c0a', .6); vc.fillRect(bx + 2, y + t.ch - 2, 1, t.th + 2);
      if (t.pine) {
        const cols = [t.dk ? '#0a2010' : '#0e2818', t.dk ? '#0e2818' : '#123020', t.dk ? '#122a18' : '#163820'];
        for (let tier = 0; tier < 4; tier++) {
          const tierH = (t.ch * .3) | 0, tierY = y + tier * (t.ch * .22) | 0, mHW = (t.cw * (1 - tier * .17)) | 0;
          for (let row = 0; row < tierH; row++) {
            const hw = (mHW * (1 - row / tierH)) | 0;
            vc.fillStyle = cols[tier % 3]; vc.fillRect(bx - hw + 1, tierY + row, Math.max(2, hw * 2), 1);
            vc.fillStyle = lighten(cols[tier % 3], 1.35); vc.fillRect(bx - hw + 1, tierY + row, 1, 1);
          }
        }
      } else {
        const cc = t.dk ? '#0b2010' : '#0e2c14', cl = t.dk ? '#102818' : '#163820', ch = t.dk ? '#162e1e' : '#1e4828';
        [[0, -t.ch * .12, t.cw, t.ch], [t.cw * .38, -t.ch * .32, t.cw * .7, t.ch * .7], [-t.cw * .32, -t.ch * .28, t.cw * .72, t.ch * .66]].forEach(([ox, oy, pw, ph], pi) => {
          for (let row = 0; row < ph; row++) {
            const hw = pw * Math.sqrt(Math.max(0, 1 - (row / ph * 2 - 1) ** 2)) * .5;
            if (hw < 1) continue;
            vc.fillStyle = [cc, cl, ch][pi % 3]; vc.fillRect((bx + ox - hw) | 0, (y + oy + row) | 0, Math.max(1, hw * 2 | 0), 1);
          }
          vc.fillStyle = lighten(cc, 1.45); vc.fillRect((bx + ox - pw * .28) | 0, (y + oy + ph * .12) | 0, (pw * .18) | 0, 1);
        });
      }
    }

    function drawVege(x, y, v) {
      const bx = x | 0;
      if (v.type === 0) {
        vc.fillStyle = '#0c2010'; vc.fillRect(bx - v.w, y, v.w * 2, v.h);
        vc.fillStyle = '#122818'; vc.fillRect(bx - (v.w * .75 | 0), y - (v.h * .4 | 0), (v.w * 1.5 | 0), (v.h * .8 | 0));
        vc.fillStyle = 'rgba(255,255,255,0.04)'; vc.fillRect(bx - (v.w * .4 | 0), y - (v.h * .3 | 0), (v.w * .5 | 0), 1);
      } else if (v.type === 1) {
        vc.fillStyle = '#183810';
        for (let b = 0; b < v.w; b += 2) { vc.fillRect(bx - v.w + b, y - (v.h + Math.sin(b) * 3 | 0), 2, v.h + 3); }
        vc.fillStyle = '#1e4814';
        for (let b = 1; b < v.w; b += 3) { vc.fillRect(bx - v.w + b, y - v.h - 2, 1, 1); }
      } else {
        vc.fillStyle = '#1c3810'; vc.fillRect(bx, y - v.h, 2, v.h);
        vc.fillStyle = v.h > 8 ? '#d0a020' : '#d04040'; vc.fillRect(bx - 2, y - v.h - 3, 5, 4);
        vc.fillStyle = '#f8e060'; vc.fillRect(bx - 1, y - v.h - 2, 3, 2);
      }
    }

    function drawProp(x, y, g) {
      const bx = x | 0;
      if (g.type <= 1) {
        vc.fillStyle = '#282c38'; vc.fillRect(bx, y, g.s * 2, g.s);
        vc.fillStyle = '#343844'; vc.fillRect(bx + 1, y, g.s * 2 - 2, 1); vc.fillRect(bx, y, 1, g.s);
        vc.fillStyle = 'rgba(0,0,0,.28)'; vc.fillRect(bx + 1, y + g.s, g.s * 2, 1);
      } else if (g.type === 2) {
        vc.fillStyle = 'rgba(180,160,120,.28)';
        vc.fillRect(bx, y, 3, g.s * 3); vc.fillRect(bx - 5, y + g.s, 14, 2); vc.fillRect(bx - 5, y + g.s * 2, 14, 2);
      } else {
        [[0, 0], [4, 1], [-3, 2], [6, 0]].forEach(([ox, oy]) => {
          vc.fillStyle = '#1e2228'; vc.fillRect(bx + ox, y + oy, 3, 2); vc.fillStyle = '#2a2e38'; vc.fillRect(bx + ox, y + oy, 2, 1);
        });
      }
    }

    function drawTrack() {
      const N = runners.length, top = HORIZON + 28, lH = (VH - top) / N;
      const off = ((SC.gnd / 4) | 0) % 12;
      vc.fillStyle = '#18280e';
      for (let i = 1; i < N; i++) {
        const ly = (top + i * lH) | 0;
        for (let dx = off; dx < VW; dx += 12)vc.fillRect(dx, ly, 6, 1);
      }
    }

    /* Finish line */
    function drawFinish(fx) {
      const top = HORIZON + 28;
      vc.fillStyle = '#d8d8d8'; vc.fillRect(fx, top, 2, VH - top);
      vc.fillStyle = 'rgba(255,255,200,.1)'; vc.fillRect(fx - 1, top, 4, VH - top);
      const cw = 7, ch = 6, cols = 4, rows = 3, fy = top - rows * ch - 2;
      for (let r = 0; r < rows; r++)for (let c = 0; c < cols; c++) {
        vc.fillStyle = (r + c) % 2 === 0 ? '#ffffff' : '#101010'; vc.fillRect(fx + 2 + c * cw, fy + r * ch, cw, ch);
      }
      vc.fillStyle = 'rgba(255,255,255,.5)'; vc.font = '6px "Press Start 2P"';
      vc.textAlign = 'center'; vc.textBaseline = 'bottom'; vc.fillText('META', fx + cols * cw / 2 + 3, fy - 2);
    }

    /* ════════════════════════════════════════════
       LANE DRAWING
       ════════════════════════════════════════════ */
    const LBL = 86, SCR = 58;

    function drawLane(runner, idx, progress, laneY, laneH) {
      const W = VW, trackW = W - LBL - SCR;
      const fill = Math.max(0, Math.min(progress, 1)) * trackW;
      const fillX = fill | 0;
      const cy = (laneY + laneH * .5) | 0;
      const bH = 7, bY = cy - (bH / 2 | 0);

      // Bar shadow
      vc.fillStyle = 'rgba(0,0,0,.45)'; vc.fillRect(LBL, bY + bH, trackW, 2); vc.fillRect(LBL + trackW, bY, 2, bH);
      // Bar bg
      vc.fillStyle = '#080c14'; vc.fillRect(LBL, bY, trackW, bH);

      if (fillX > 0) {
        const sc = SHIRT[runner.shirt];
        vc.fillStyle = darken(sc, .58); vc.fillRect(LBL, bY, fillX, bH);
        vc.fillStyle = sc; vc.fillRect(LBL, bY + 1, fillX, bH - 2);
        vc.fillStyle = lighten(sc, 1.65); vc.fillRect(LBL, bY, fillX, 1);
        // Segment ticks every 10%
        for (let s = 1; s < 10; s++) {
          const tx = (LBL + trackW * s * .1) | 0;
          if (tx < LBL + fillX) { vc.fillStyle = 'rgba(0,0,0,.3)'; vc.fillRect(tx, bY, 1, bH); }
        }
        if (fillX < trackW) { vc.fillStyle = lighten(sc, 1.3); vc.fillRect(LBL + fillX - 1, bY, 1, bH); }
      }

      // Name
      vc.fillStyle = '#608098'; vc.font = '7px "Press Start 2P"';
      vc.textAlign = 'left'; vc.textBaseline = 'middle';
      vc.fillText(runner.name.slice(0, 10), 4, cy);

      // Score
      const val = animVals[idx] | 0;
      const pct = GOAL > 0 ? (val / GOAL * 100 | 0) : 0;
      vc.fillStyle = lighten(SHIRT[runner.shirt], 1.15); vc.font = '7px "Press Start 2P"';
      vc.textAlign = 'right'; vc.fillText(`${val}`, W - 2, cy - 5);
      vc.fillStyle = '#405870'; vc.font = '5px "Press Start 2P"'; vc.fillText(`${pct}%`, W - 2, cy + 6);

      // Sprite
      if (fillX >= 8) {
        const goalDone = progress >= 0.99;
        const fi = goalDone ? 99 : ((framePh[idx] | 0) % 3);
        const sp = getCached(runner, fi);
        // Scale: fit to lane height
        const desH = laneH * 0.94;
        const scale = Math.max(2, Math.min(4, (desH / SH) | 0));
        const sw = SW * scale, sh = SH * scale;
        const sx = (LBL + fillX - sw * .28) | 0;
        const sy = (cy + bH * .5 - sh + 2) | 0;
        // Ground shadow ellipse
        vc.fillStyle = 'rgba(0,0,0,.28)';
        vc.beginPath(); vc.ellipse(sx + sw * .5, sy + sh, sw * .42, 3, 0, 0, Math.PI * 2); vc.fill();
        vc.imageSmoothingEnabled = false;
        vc.drawImage(sp, sx, sy, sw, sh);
      }
    }

    /* Ranking */
    function drawRanking() {
      const sorted = [...runners].map((r, i) => ({ ...r, av: animVals[i] })).sort((a, b) => b.av - a.av);
      const px = VW - 124, py = 4, pw = 120, rh = 18, ph = 3 * rh + 6;
      vc.fillStyle = 'rgba(3,4,10,.92)'; vc.fillRect(px - 2, py - 2, pw + 4, ph + 4);
      vc.fillStyle = '#1c2840'; vc.fillRect(px - 2, py - 2, pw + 4, 1); vc.fillRect(px - 2, py - 2, 1, ph + 4);
      vc.fillStyle = '#0a1020'; vc.fillRect(px, py + ph, pw, 1); vc.fillRect(px + pw, py, 1, ph);
      const mc2 = ['#f0c000', '#b0b8c0', '#b06020'];
      sorted.slice(0, 3).forEach((r, i) => {
        const ry = py + 3 + i * rh;
        vc.fillStyle = mc2[i]; vc.font = '7px "Press Start 2P"'; vc.textAlign = 'left'; vc.textBaseline = 'top';
        vc.fillText(`${i + 1}`, px + 3, ry + 1);
        vc.fillStyle = SHIRT[r.shirt]; vc.font = '7px "Press Start 2P"';
        vc.fillText(r.name.slice(0, 10), px + 18, ry + 1);
        vc.fillStyle = '#405870'; vc.fillText(`${r.av | 0}`, px + 80, ry + 1);
        const bw = ((Math.min(r.av / Math.max(GOAL, 1), 1)) * 32) | 0;
        vc.fillStyle = '#0c1420'; vc.fillRect(px + 80, ry + 10, 32, 4);
        vc.fillStyle = SHIRT[r.shirt]; vc.fillRect(px + 80, ry + 10, bw, 4);
      });
    }

    /* ════════════════════════════════════════════
       MAIN LOOP
       ════════════════════════════════════════════ */
    function loop(ts) {
      if (!lastT) lastT = ts;
      const dt = Math.min((ts - lastT) / 1000, .1); lastT = ts;
      if (!paused) {
        const SPD = 42;
        SC.stars += SPD * .014 * dt; SC.mtn += SPD * .05 * dt; SC.city += SPD * .11 * dt;
        SC.tree += SPD * .44 * dt; SC.gnd += SPD * dt;
        animVals = animVals.map((v, i) => { const d = targetVals[i] - v; return Math.abs(d) < .04 ? targetVals[i] : v + d * dt * 1.8; });
        framePh = framePh.map((p, i) => { const s = .5 + (animVals[i] / Math.max(GOAL, 1)) * 6; return p + dt * s * 5; });
      }
      const N = runners.length, top = HORIZON + 28, lH = (VH - top) / N, trackW = VW - LBL - SCR;
      vc.clearRect(0, 0, VW, VH);
      drawLandscape();
      drawFinish(LBL + trackW);
      runners.forEach((r, i) => drawLane(r, i, GOAL > 0 ? animVals[i] / GOAL : 0, top + i * lH, lH));
      drawRanking();
      // Blit to screen (letterboxed)
      const mW = MC.width, mH = MC.height;
      mc.fillStyle = '#06070f'; mc.fillRect(0, 0, mW, mH);
      const scale = Math.min(mW / VW, mH / VH);
      mc.drawImage(vCv, 0, 0, VW, VH, (mW - VW * scale) / 2 | 0, (mH - VH * scale) / 2 | 0, VW * scale | 0, VH * scale | 0);
      requestAnimationFrame(loop);
    }

    /* ════════════════════════════════════════════
       AVATAR PREVIEW  (48×64 display)
       ════════════════════════════════════════════ */
    function makeAvatar(runner) {
      const oc = document.createElement('canvas'); oc.width = 32; oc.height = 48;
      const o2 = oc.getContext('2d'); o2.imageSmoothingEnabled = false;
      o2.fillStyle = '#0a0c18'; o2.fillRect(0, 0, 32, 48);
      const sp = getCached(runner, 1);
      o2.drawImage(sp, 0, 0, SW, SH, 0, 0, 32, 48);
      return oc.toDataURL();
    }

    /* ════════════════════════════════════════════
       SIDEBAR
       ════════════════════════════════════════════ */
    function $id(s) { return document.getElementById(s) }
    function selAll(pfx, idx, n) { for (let j = 0; j < n; j++)$id(pfx + j)?.classList.toggle('sel', j === idx); }

    function renderSidebar() {
      const sorted = [...runners].map((r, i) => ({ ...r, oi: i, av: animVals[i] })).sort((a, b) => b.av - a.av);
      $id('sb').innerHTML = `
    <div class="slb">⚙ CONFIG</div>
    <div class="grow"><label>META EXPEDIENTES</label>
      <input class="pxi" type="number" id="goalIn" value="${GOAL}" min="1"></div>
    <div class="slb">▶ CORREDORES</div>
    ${sorted.map((r, rank) => cardHTML(r, rank)).join('')}`;
      $id('goalIn').onchange = e => { GOAL = parseInt(e.target.value) || 100; updH(); };
      runners.forEach((_, i) => bindCard(i));
    }

    function bindCard(i) {
      $id('nm' + i)?.addEventListener('input', e => { runners[i].name = e.target.value; });
      $id('vl' + i)?.addEventListener('input', e => { runners[i].value = parseInt(e.target.value) || 0; refreshBar(i); });
      $id('av' + i)?.addEventListener('click', () => {
        const cp = $id('cp' + i), rc = $id('rc' + i);
        const o = cp.classList.toggle('open'); rc.classList.toggle('open', o);
      });
      const rb = (pfx, arr, prop, cb) => arr.forEach((_, ci) => {
        $id(`${pfx}${i}_${ci}`)?.addEventListener('click', () => {
          runners[i][prop] = ci; clearCache(i); refreshAv(i); if (cb) cb(i); selAll(`${pfx}${i}_`, ci, arr.length);
        });
      });
      rb('gn', GENDER_NAMES, 'gender', null);
      rb('hs', HAIR_NAMES, 'hStyle', null);
      rb('sk', SKIN, 'skin', null);
      rb('hc', HAIR, 'hair', null);
      rb('sc', SHIRT, 'shirt', i2 => refreshBar(i2));
      rb('pc', PANTS, 'pants', null);
      rb('zo', SHOES, 'shoe', null);
    }

    function refreshBar(i) {
      const r = runners[i]; const pct = GOAL > 0 ? Math.min(100, (r.value / GOAL * 100) | 0) : 0;
      const b = $id('pb' + i); if (b) { b.style.width = pct + '%'; b.style.background = SHIRT[r.shirt]; }
      const pp = $id('cp2' + i); if (pp) pp.textContent = `${pct}% · ${r.value} exp.`;
    }
    function refreshAv(i) { const el = $id('avimg' + i); if (el) el.src = makeAvatar(runners[i]); }
    function updH() { $id('hstat').textContent = `META: ${GOAL} · ${runners.length} RUNNERS`; }

    function cardHTML(r, rank) {
      const medals = ['🥇', '🥈', '🥉'];
      const pct = GOAL > 0 ? Math.min(100, (r.value / GOAL * 100) | 0) : 0;
      const i = r.oi; const av = makeAvatar(r);
      const mk = (pfx, arr, prop, rnd) => arr.map((c, ci) =>
        `<div class="sw${rnd ? ' rnd' : ''} ${ci === r[prop] ? 'sel' : ''}" id="${pfx}${i}_${ci}" style="background:${c}"></div>`).join('');
      const mt = (pfx, arr, prop) => arr.map((nm, ni) =>
        `<button class="tg ${ni === r[prop] ? 'sel' : ''}" id="${pfx}${i}_${ni}">${nm}</button>`).join('');
      return `<div class="rc" id="rc${i}">
    <div class="ctop">
      <div class="avbox" id="av${i}" title="Personalizar">
        <img id="avimg${i}" src="${av}" style="display:block;width:100%;height:100%;image-rendering:pixelated"></div>
      <div class="cmeta">
        <input class="nmi" type="text" id="nm${i}" value="${r.name}" maxlength="12">
</div>
      <div class="rnk">${medals[rank] || '#' + (rank + 1)}</div></div>
    <div class="vrow"><span class="vlb">EXP:</span>
      <input class="pxi vni" type="number" id="vl${i}" value="${r.value}" min="0"></div>
    <div class="baro"><div class="bari" id="pb${i}" style="width:${pct}%;background:${SHIRT[r.shirt]}"></div></div>
    <div class="cpan" id="cp${i}">
      <div class="cplb">TONO DE PIEL</div><div class="swrow">${mk('sk', SKIN, 'skin', true)}</div>
      <div class="cplb">COLOR DE PELO</div><div class="swrow">${mk('hc', HAIR, 'hair', true)}</div>
      <div class="cplb">ESTILO DE PELO</div><div class="trow">${mt('hs', HAIR_NAMES, 'hStyle')}</div>
      <div class="cplb">CAMISETA</div><div class="swrow">${mk('sc', SHIRT, 'shirt', false)}</div>
      <div class="cplb">PANTALÓN</div><div class="swrow">${mk('pc', PANTS, 'pants', false)}</div>
      <div class="cplb">ZAPATILLAS</div><div class="swrow">${mk('zo', SHOES, 'shoe', false)}</div>
    </div></div>`;
    }

    function applyAll() {
      runners.forEach((r, i) => { targetVals[i] = r.value; });
      GOAL = parseInt($id('goalIn')?.value) || GOAL;
      updH(); renderSidebar(); toast('GUARDADO!');
    }
    function togglePause() { paused = !paused; $id('pauseBtn').textContent = paused ? '► PLAY' : '⏸ PAUSE'; }
    function toast(msg) { const t = $id('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

    renderSidebar();
    requestAnimationFrame(loop);
  </script>
</body>

</html>
